## Tandem — nginx site config snippet
## Drop into your existing /etc/nginx/sites-available/<site>.conf and reload.
## Assumes Next.js runs on 127.0.0.1:3000 and the ws server on 127.0.0.1:1234.

server {
    listen 443 ssl http2;
    server_name tandem.example.com;

    # ssl_certificate     /etc/letsencrypt/live/tandem.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tandem.example.com/privkey.pem;

    # WebSocket -> y-websocket server
    location /ws/ {
        proxy_pass http://127.0.0.1:1234/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Next.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HSTS — opt in once you're sure cert renewal works
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

server {
    listen 80;
    server_name tandem.example.com;
    return 301 https://$host$request_uri;
}

# Then in your client .env:
#   NEXT_PUBLIC_WS_URL=wss://tandem.example.com/ws
