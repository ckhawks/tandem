## Tandem — nginx site config for tandem.stlr.cx
## Place at /etc/nginx/sites-available/tandem.stlr.cx.conf and symlink into sites-enabled/.
## TLS is assumed to come from certbot (`certbot --nginx -d tandem.stlr.cx`).

server {
    listen 80;
    listen [::]:80;
    server_name tandem.stlr.cx;
    # certbot will overwrite this block with a 301 to https after it issues a cert.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tandem.stlr.cx;

    # certbot --nginx will fill these in:
    # ssl_certificate     /etc/letsencrypt/live/tandem.stlr.cx/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tandem.stlr.cx/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket -> y-websocket server. Path is /ws/<docId>?token=...
    # The trailing slash on proxy_pass strips /ws and forwards /<docId>?token=... .
    location /ws/ {
        proxy_pass http://127.0.0.1:1234/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Next.js app
    location / {
        proxy_pass http://127.0.0.1:3742;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # HSTS — enable once you're sure certbot renewals are working.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 5m;
}
